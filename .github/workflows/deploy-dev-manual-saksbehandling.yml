name: Manuell deploy dev saksbehandling

on:
  workflow_dispatch: {}

jobs:
  compile-test-and-build:
    name: Compile, test and build image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    env:
      VITE_ENABLE_MOCKS: "true"
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://npm.pkg.github.com/
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Typecheck frontend
        run: pnpm --filter ./frontend/saksbehandling typecheck

      - name: Typecheck server
        run: pnpm --filter ./frontend/saksbehandling-server typecheck

      - name: Login to NAIS (sets registry and OIDC)
        id: login
        uses: nais/login@v0
        with:
          team: fager
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Build and push image
        id: docker-build-push
        uses: nais/docker-build-push@v0
        with:
          team: fager
          image_suffix: saksbehandling
          tag: ${{ github.sha }}
          docker_context: .
          dockerfile: frontend/saksbehandling-server/Dockerfile
          build_args: |
            NODE_AUTH_TOKEN=${{ secrets.READER_TOKEN }}
            VITE_ENABLE_MOCKS=${{ env.VITE_ENABLE_MOCKS }}
          salsa: true

  deploy-to-dev-gcp:
    name: Deploy to dev-gcp
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    needs: compile-test-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to NAIS (sets registry and OIDC)
        uses: nais/login@v0
        with:
          team: fager

      - name: Deploy dev-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: nais/dev-gcp-saksbehandling.yaml
          PRINT_PAYLOAD: "true"
          VAR: image=${{ needs.compile-test-and-build.outputs.image }}
          REF: ${{ github.sha }}
