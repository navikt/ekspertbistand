apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: ekspertbistand-saksbehandling
  namespace: fager
  labels:
    team: fager
spec:
  image: {{ image }}
  port: 4000
  ingresses:
    - https://ekspertbistand-saksbehandling.intern.dev.nav.no

  replicas:
    min: 1
    max: 1

  tokenx:
    enabled: false

  idporten:
    enabled: false

  observability:
    autoInstrumentation:
      enabled: true
      runtime: nodejs
    logging:
      destinations:
        - id: loki

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  liveness:
    path: /internal/isAlive

  readiness:
    path: /internal/isAlive
